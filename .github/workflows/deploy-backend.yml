name: Deploy Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'template.yaml'
      - 'samconfig.toml'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - 'template.yaml'
      - 'samconfig.toml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.12'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "test-secret-key-for-ci"
          ENVIRONMENT: "test"
        run: pytest -v --tb=short

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --use-container --cached

      - uses: actions/upload-artifact@v4
        with:
          name: sam-build-artifacts
          path: .aws-sam/build/

  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name != 'pull_request'
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      should-deploy: ${{ steps.env.outputs.should-deploy }}
    steps:
      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  migrate:
    name: Migrate DB
    runs-on: ubuntu-latest
    needs: [determine-environment]
    if: needs.determine-environment.outputs.should-deploy == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install alembic

      - name: Resolve database URL
        id: db-url
        run: |
          case "${{ needs.determine-environment.outputs.environment }}" in
            prod) DB_URL="${{ secrets.DATABASE_URL_PROD }}" ;;
            *)    DB_URL="${{ secrets.DATABASE_URL_DEV }}" ;;
          esac
          if [ -z "$DB_URL" ]; then
            echo "❌ DATABASE_URL secret not set"
            exit 1
          fi
          echo "::add-mask::$DB_URL"
          echo "db_url=$DB_URL" >> $GITHUB_OUTPUT

      - name: Run migrations
        env:
          DATABASE_URL: ${{ steps.db-url.outputs.db_url }}
          SECRET_KEY: "migration-only"
        run: alembic upgrade head
    outputs:
      db-url: ${{ steps.db-url.outputs.db_url }}

  deploy:
    name: Deploy (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [determine-environment, migrate]
    if: needs.determine-environment.outputs.should-deploy == 'true'
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: actions/download-artifact@v4
        with:
          name: sam-build-artifacts
          path: .aws-sam/build/

      - name: Set environment variables
        id: env-vars
        env:
          DEPLOY_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          case "$DEPLOY_ENV" in
            dev)     AWS_ROLE_ARN="${{ vars.AWS_ROLE_ARN_DEV || vars.AWS_ROLE_ARN }}" ;;
            staging) AWS_ROLE_ARN="${{ vars.AWS_ROLE_ARN_STAGING || vars.AWS_ROLE_ARN }}" ;;
            prod)    AWS_ROLE_ARN="${{ vars.AWS_ROLE_ARN_PROD || vars.AWS_ROLE_ARN }}" ;;
          esac
          SECRET_NAME="${{ vars.SECRET_NAME_DEV || format('jewelry-manufacturing-{0}', needs.determine-environment.outputs.environment) }}"
          echo "aws-role-arn=$AWS_ROLE_ARN" >> $GITHUB_OUTPUT
          echo "secret-name=$SECRET_NAME" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env-vars.outputs.aws-role-arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Retrieve secrets
        id: secrets
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${{ steps.env-vars.outputs.secret-name }}" \
            --query SecretString --output text)
          DATABASE_URL=$(echo "$SECRET_JSON" | jq -r .DATABASE_URL)
          JWT_SECRET_KEY=$(echo "$SECRET_JSON" | jq -r .JWT_SECRET_KEY)
          CORS_ORIGINS=$(echo "$SECRET_JSON" | jq -r .CORS_ORIGINS)
          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$JWT_SECRET_KEY"
          echo "DATABASE_URL=$DATABASE_URL" >> $GITHUB_OUTPUT
          echo "JWT_SECRET_KEY=$JWT_SECRET_KEY" >> $GITHUB_OUTPUT
          echo "CORS_ORIGINS=$CORS_ORIGINS" >> $GITHUB_OUTPUT

      - name: Deploy to AWS Lambda
        env:
          DEPLOY_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          CORS="${{ steps.secrets.outputs.CORS_ORIGINS }}"
          [ -z "$CORS" ] && CORS="http://localhost:5173,http://localhost:3000"
          sam deploy \
            --config-env "$DEPLOY_ENV" \
            --parameter-overrides \
              DatabaseURL=${{ steps.secrets.outputs.DATABASE_URL }} \
              SecretKey=${{ steps.secrets.outputs.JWT_SECRET_KEY }} \
              Stage=$DEPLOY_ENV \
              AllowedOrigins=$CORS \
            --no-fail-on-empty-changeset \
            --no-confirm-changeset

      - name: Validate deployment
        id: validate
        env:
          DEPLOY_ENV: ${{ needs.determine-environment.outputs.environment }}
        run: |
          STACK_NAME="jewelry-backend-$DEPLOY_ENV"
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "API_URL=$API_URL" >> $GITHUB_OUTPUT
          sleep 5
          curl -sf "$API_URL/docs" > /dev/null && echo "✅ API is live at $API_URL" || echo "⚠️ API health check returned non-200"
